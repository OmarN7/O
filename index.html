<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحويل...</title>
    <!-- كود Monetag -->
    <script src="https://libti.com" data-zone="10941580" data-cfasync="false"></script>
</head>
<body style="background-color: #121212; color: white; text-align: center; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0;">

    <div style="padding: 20px; border: 1px solid #333; border-radius: 15px; background: #1e1e1e; margin: 20px;">
        <h2 id="statusText">جاري تحضير السيرفر...</h2>
        <p style="color: #bbb;">اضغط على الزر بالأسفل للبدء</p>
        
        <button id="showAdBtn" style="padding: 15px 40px; font-size: 20px; font-weight: bold; cursor: pointer; background-color: #6200ea; color: white; border: none; border-radius: 10px;">
            مشاهدة الآن
        </button>
    </div>

    <script>
        // الرابط اللي بدك الناس تروح عليه (Telebox)
        var myFinalLink = "https://lbx.zone";

        document.getElementById('showAdBtn').onclick = function() {
            document.getElementById('statusText').innerText = "جاري تشغيل الإعلان...";

            // محاولة تشغيل الإعلان
            if (typeof show_10941580 === 'function') {
                show_10941580().then(function() {
                    // بعد الإعلان يروح للتيلي بوكس
                    window.location.href = myFinalLink;
                }).catch(function() {
                    // لو فشل الإعلان يروح للتيلي بوكس
                    window.location.href = myFinalLink;
                });
            } else {
                // لو الكود ما حمل أصلاً يروح للتيلي بوكس
                window.location.href = myFinalLink;
            }
        };
    </script>
</body>
</html>
